<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CartoonPorn Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 100%;
            padding: 2rem;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s;
            font-family: monospace;
        }
        
        input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 2rem;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .download-btn {
            display: inline-block;
            width: 100%;
            background: #28a745;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            margin-top: 10px;
            transition: background 0.2s;
        }
        
        .download-btn:hover {
            background: #218838;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #888;
            text-align: center;
        }
        
        .url-preview {
            font-size: 0.8rem;
            word-break: break-all;
            color: #666;
            margin-top: 10px;
            padding: 8px;
            background: #e9ecef;
            border-radius: 8px;
            font-family: monospace;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 1.5rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 CartoonPorn Downloader</h1>
        <div class="subtitle">Extract & download videos directly to your device</div>
        
        <div class="input-group">
            <label>🔗 Video URL from cartoonporn.com</label>
            <input type="text" id="videoUrl" placeholder="https://www.cartoonporn.com/videos/15523/hump-bang-720p-50fps/" value="https://www.cartoonporn.com/videos/15523/hump-bang-720p-50fps/">
        </div>
        
        <button id="fetchBtn">🚀 Extract Download Link</button>
        
        <div id="result" class="result"></div>
        
        <div class="info">
            ⚡ Works with any cartoonporn.com video | 💾 Download then save to gallery
        </div>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const videoUrlInput = document.getElementById('videoUrl');
        const resultDiv = document.getElementById('result');
        
        fetchBtn.addEventListener('click', async () => {
            let videoUrl = videoUrlInput.value.trim();
            
            if (!videoUrl) {
                showError('Please enter a video URL');
                return;
            }
            
            if (!videoUrl.includes('cartoonporn.com/videos/')) {
                showError('URL must be from cartoonporn.com/videos/...');
                return;
            }
            
            // Show loading
            fetchBtn.disabled = true;
            fetchBtn.innerHTML = '<span class="loader"></span> Extracting...';
            resultDiv.classList.remove('show');
            
            try {
                const response = await fetch('/api/get-download-url', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ videoUrl: videoUrl })
                });
                
                const data = await response.json();
                
                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Failed to extract link');
                }
                
                // Show success with download button
                resultDiv.innerHTML = `
                    <div class="success">✅ Video link extracted successfully!</div>
                    <a href="${data.downloadUrl}" class="download-btn" download>⬇️ Click to Download Video</a>
                    <div class="url-preview">📹 Direct link: ${data.downloadUrl.substring(0, 80)}...</div>
                    <div style="font-size: 0.8rem; margin-top: 10px; color: #666;">
                        💡 On mobile: After download, open your "Downloads" folder and move the video to your gallery/Camera Roll
                    </div>
                `;
                resultDiv.classList.add('show');
                
            } catch (error) {
                showError(error.message);
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.innerHTML = '🚀 Extract Download Link';
            }
        });
        
        function showError(message) {
            resultDiv.innerHTML = `
                <div class="error">❌ ${message}</div>
                <div style="font-size: 0.8rem; margin-top: 10px;">
                    💡 Try: Make sure the URL is correct and the video exists
                </div>
            `;
            resultDiv.classList.add('show');
        }
    </script>
</body>
</html>
