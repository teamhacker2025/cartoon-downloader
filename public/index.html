<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CartoonPorn Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .sub {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #5a67d8;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .download-link {
            display: block;
            background: #28a745;
            color: white;
            text-decoration: none;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 CartoonPorn Downloader</h1>
        <div class="sub">Download any video directly</div>
        
        <input type="text" id="urlInput" placeholder="Paste cartoonporn.com video URL here">
        <button id="downloadBtn">Get Download Link</button>
        
        <div id="result" class="result"></div>
        
        <div class="info">
            💡 How to use:<br>
            1. Go to cartoonporn.com and copy a video URL<br>
            2. Paste it above and click the button<br>
            3. Click the download button to save the video
        </div>
    </div>
    
    <script>
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const resultDiv = document.getElementById('result');
        
        downloadBtn.addEventListener('click', async () => {
            const videoUrl = urlInput.value.trim();
            
            if (!videoUrl) {
                showError('Please enter a video URL');
                return;
            }
            
            if (!videoUrl.includes('cartoonporn.com')) {
                showError('Please enter a valid cartoonporn.com URL');
                return;
            }
            
            // Show loading
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<span class="loader"></span> Processing...';
            resultDiv.classList.remove('show');
            
            try {
                const response = await fetch('/api/get-download-url', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ videoUrl: videoUrl })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                } else if (data.success && data.url) {
                    resultDiv.innerHTML = `
                        <div class="success show">
                            ✅ Video link found!
                            <a href="${data.url}" class="download-link" download>⬇️ Click to Download Video</a>
                            <small style="display: block; margin-top: 10px; word-break: break-all;">${data.url}</small>
                        </div>
                    `;
                    resultDiv.classList.add('show');
                } else {
                    showError('Could not extract download link');
                }
            } catch (error) {
                showError('Network error: ' + error.message);
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = 'Get Download Link';
            }
        });
        
        function showError(message) {
            resultDiv.innerHTML = `<div class="error show">❌ ${message}</div>`;
            resultDiv.classList.add('show');
        }
        
        // Add example URL
        urlInput.value = 'https://www.cartoonporn.com/videos/15523/hump-bang-720p-50fps/';
    </script>
</body>
</html>
